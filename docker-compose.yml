services:
  voice-gateway:
    build: .
    command: npx tsx apps/voice-gateway/src/index.ts
    ports:
      - "3000:3000"
    env_file:
      - .env
      - apps/voice-gateway/.env
    environment:
      - PORT=3000
      - MEMORY_API_URL=http://memory-api:3001
      - REMINDERS_API_URL=http://reminders-api:3004
      - USERDATA_API_URL=http://userdata-api:3002
    depends_on:
      - memory-api
      - reminders-api
      - userdata-api
    restart: unless-stopped

  memory-api:
    build: .
    command: npx tsx packages/api/memoryapi.ts
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PORT=3001
    restart: unless-stopped

  userdata-api:
    build: .
    command: npx tsx packages/api/memorydataapi.ts
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      - PORT=3002
    restart: unless-stopped

  reminders-api:
    build: .
    command: npx tsx packages/api/remindersapi.ts
    ports:
      - "3004:3004"
    env_file: .env
    environment:
      - REMINDERS_API_PORT=3004
      - VOICE_GATEWAY_URL=${VOICE_GATEWAY_URL}
    restart: unless-stopped

  memory-mcp:
    build: .
    command: npx tsx packages/mcp/src/memory.ts
    ports:
      - "3005:3005"
    env_file: .env
    environment:
      - MEMORY_MCP_PORT=3005
      - MEMORY_API_BASE_URL=http://memory-api:3001
    depends_on:
      - memory-api
    restart: unless-stopped

  reminders-mcp:
    build: .
    command: npx tsx packages/mcp/src/reminders.ts
    ports:
      - "3006:3006"
    env_file: .env
    environment:
      - REMINDERS_MCP_PORT=3006
      - REMINDERS_API_BASE_URL=http://reminders-api:3004
    depends_on:
      - reminders-api
    restart: unless-stopped

  userdata-mcp:
    build: .
    command: npx tsx packages/mcp/src/memorydata.ts
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      - USERDATA_MCP_PORT=3003
      - USERDATA_API_BASE_URL=http://userdata-api:3002
      - MEMORY_API_BASE_URL=http://memory-api:3001
    depends_on:
      - userdata-api
      - memory-api
    restart: unless-stopped

  ops-dashboard:
    build: .
    command: sh -c "cd apps/ops-dashboard && npx next build && npx next start -p 3009"
    ports:
      - "3009:3009"
    env_file: .env
    environment:
      - USER_DATA_API_URL=http://userdata-api:3002
      - MEMORIES_API_URL=http://memory-api:3001
      - REMINDERS_API_URL=http://reminders-api:3004
    depends_on:
      - memory-api
      - userdata-api
      - reminders-api
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - voice-gateway
    restart: unless-stopped
